# Cash Raja — local infrastructure (backend + admin containers arrive in phase F)
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: cashraja-postgres
    environment:
      POSTGRES_DB: cashraja
      POSTGRES_USER: cashraja
      POSTGRES_PASSWORD: cashraja
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cashraja -d cashraja']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cashraja-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
